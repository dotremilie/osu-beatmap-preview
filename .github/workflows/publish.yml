name: Publish to npm

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        run: |
          node -e "const pkg = require('./package.json'); const expected = `v${pkg.version}`; const actual = process.env.GITHUB_REF_NAME; if (actual !== expected) { throw new Error(`Release tag ${actual} does not match package version ${expected}`); }"

      - name: Audit dependencies
        run: npm audit

      - name: Build package
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run --ignore-scripts

      - name: Publish package
        run: npm publish --ignore-scripts --access public
